_schema-version: 3.3.0
ID: Fiorielementsfeatures
description: A simple CAP project.
version: 1.0.0
modules:
- name: Fiorielementsfeatures-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: Fiorielementsfeatures-db
  - name: uaa_Fiorielementsfeatures
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: Fiorielementsfeatures-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: Fiorielementsfeatures-db
  parameters:
    buildpack: nodejs_buildpack
- name: Fiorielementsfeatures-destination-content
  type: com.sap.application.content
  requires:
  - name: Fiorielementsfeatures-destination-service
    parameters:
      content-target: true
  - name: Fiorielementsfeatures_html_repo_host
    parameters:
      service-key:
        name: Fiorielementsfeatures_html_repo_host-key
  - name: uaa_Fiorielementsfeatures
    parameters:
      service-key:
        name: uaa_Fiorielementsfeatures-key
  parameters:
    content:
      instance:
        destinations:
        - Name: zperfbs_Fiorielementsfeatures_html_repo_host
          ServiceInstanceName: Fiorielementsfeatures-html5-app-host-service
          ServiceKeyName: Fiorielementsfeatures_html_repo_host-key
          sap.cloud.service: zperfbs
        - Authentication: OAuth2UserTokenExchange
          Name: zperfbs_uaa_Fiorielementsfeatures
          ServiceInstanceName: Fiorielementsfeatures-xsuaa-service
          ServiceKeyName: uaa_Fiorielementsfeatures-key
          sap.cloud.service: zperfbs
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: Fiorielementsfeatures-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: Fiorielementsfeatures_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comsubbutestmodule.zip
      name: comsubbutestmodule
      target-path: resources/
- name: comsubbutestmodule
  type: html5
  path: app/testmodule
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: Fiorielementsfeatures-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: Fiorielementsfeatures-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: Fiorielementsfeatures-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: Fiorielementsfeatures_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: Fiorielementsfeatures-html5-app-host-service
    service-plan: app-host
- name: uaa_Fiorielementsfeatures
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: Fiorielementsfeatures-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
